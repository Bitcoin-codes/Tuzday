name: mobile_ide_shell
description: A minimal Flutter shell embedding a web-editor for the Mobile IDE demo.
publish_to: "none"
version: 0.0.1
environment:
  sdk: ">=2.18.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.0.7
dev_dependencies:
  flutter_test:
    sdk: flutter
flutter:
  uses-material-design: true
  assets:
    - assets/web-editor/index.html
    - assets/web-editor/editor.js
