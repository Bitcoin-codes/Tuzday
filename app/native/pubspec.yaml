name: mobile_ide_shell
description: A minimal Flutter shell embedding a native editor and a Pyodide runner for Python execution.
publish_to: "none"
version: 0.0.1
environment:
  sdk: ">=2.18.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.0.7
  path_provider: ^2.0.14
  path: ^1.8.3
  code_text_field: ^1.5.3
  highlight: ^0.7.0
dev_dependencies:
  flutter_test:
    sdk: flutter
flutter:
  uses-material-design: true
  assets:
    - assets/web-editor/index.html
    - assets/web-editor/editor.js
    - assets/pyodide_runner.html
